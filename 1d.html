<!DOCTYPE html>
<html>
<head>
<title>Form Controls</title>
</head>
<body>
<form>
<table border="1" cell spacing="2" cell padding="5">
<tr>
<td>Name</td>
<td><input type="text"></td>
</tr>
<tr>
<td>Password</td>
<td><input type="password"></td>
</tr>
<tr>
<td>Age</td>
<td><input type="number"></td>
</tr>
<tr>
<td>DOB</td>
<td><input type="date"></td>
</tr>
<tr>
<td>Gender</td>
<td><input type="radio" name="g">Male
<input type="radio" name="g">Female
</td>
</tr>
<tr>
<td>Hobbies</td>
<td><input type="checkbox">Reading
<input type="checkbox">Music 
</td>
</tr>
<tr>
<td>Course</td>
<td>
<select>
<option>CSS</option>
<option>ECE</option>
</select>
</td>
</tr>
<tr>
<td>Address</td>
<td><textarea></textarea></td>
</tr>
<tr>
<td><input type="submit"></td>
<td><input type="reset"></td>
</tr>
</table>
</form>
</body>
</html>
